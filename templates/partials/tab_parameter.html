<div class="tab-content {% if not streaming_mode %}active{% endif %}" id="tab-parameter">
    <div class="panel-header">
        <h2><i class="fas fa-sliders-h"></i> Parameters</h2>
        <p class="panel-desc">Configure analysis inputs and optional option positions.</p>
    </div>

    <form method="post" id="analysis-form">
        {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="form-card">
            <div class="form-card-title" style="display:flex;align-items:center;justify-content:space-between;">
                <span>Analysis Settings</span>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-play"></i> Run
                </button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="ticker">Ticker Symbols（多个用逗号分隔）</label>
                    <input type="text" id="ticker" name="ticker" value=""
                           placeholder="e.g. AAPL, SPY, ^SPX" required>
                    <div class="ticker-validation" id="ticker-validation"></div>
                    <div id="ticker-validation-container" class="ticker-badges"></div>
                </div>

                <div class="form-group">
                    <label>Time Horizon</label>
                    <div class="compact-range-input">
                        <input type="month" id="start_time" name="start_time"
                               value="{{ (start_time[:4] + '-' + start_time[4:6]) if start_time and start_time|length == 6 else start_time or '' }}"
                               required>
                        <span class="range-separator">→</span>
                        <input type="month" id="end_time" name="end_time"
                               value="{{ (end_time[:4] + '-' + end_time[4:6]) if end_time and end_time|length == 6 else end_time or '' }}"
                               placeholder="latest">
                    </div>
                    <div class="validation-warning" id="horizon-warning" style="display:none;"></div>
                </div>

                <div class="form-group">
                    <label for="account_size">Account Size <span class="label-unit">$</span></label>
                    <input type="number" id="account_size" name="account_size"
                           min="0" step="1000" placeholder="e.g. 100000"
                           value="{{ account_size if account_size is defined and account_size else '' }}">
                </div>
                <div class="form-group">
                    <label for="max_risk_pct">Max Risk <span class="label-unit">%</span></label>
                    <input type="number" id="max_risk_pct" name="max_risk_pct"
                           min="0.1" max="20" step="0.1" placeholder="e.g. 2"
                           value="{{ max_risk_pct if max_risk_pct is defined and max_risk_pct else '' }}">
                </div>
            </div>
        </div>

        <!-- Hidden fields for Config tab values (injected by JS from localStorage) -->
        <input type="hidden" id="frequency" name="frequency" value="{{ frequency or 'ME' }}">
        <input type="hidden" id="side_bias" name="side_bias" value="{{ side_bias or 'Natural' }}">
        <input type="hidden" id="risk_threshold" name="risk_threshold" value="{{ risk_threshold if risk_threshold is defined and risk_threshold is not none else 90 }}">
        <input type="hidden" id="rolling_window" name="rolling_window" value="{{ rolling_window if rolling_window is defined and rolling_window is not none else 120 }}">
        <input type="hidden" id="option_position" name="option_position">

        <!-- Positions (always visible) -->
        <div class="form-card" id="positions-card">
            <div class="form-card-title" style="display:flex;align-items:center;justify-content:space-between;">
                <span><i class="fas fa-layer-group"></i> Positions</span>
                <button type="button" class="btn-primary" id="portfolio-analysis-btn" onclick="runPortfolioAnalysis()">
                    <i class="fas fa-chart-pie"></i> 组合分析
                </button>
            </div>
            <div class="options-table-container">
                <table id="positions-table" class="options-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Type</th>
                            <th>Expiry</th>
                            <th>Strike</th>
                            <th>Side</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="positions-tbody"></tbody>
                </table>
                <div class="add-row-container">
                    <button type="button" class="btn-ghost" onclick="addPositionRow()">
                        <i class="fas fa-plus"></i> Add Position
                    </button>
                </div>
            </div>
            <!-- Portfolio analysis results panel -->
            <div id="portfolio-results-panel" style="display:none;">
                <div class="content-card" style="margin-top:1rem;">
                    <div class="content-card-title">Greeks Summary</div>
                    <div id="greeks-summary-card"></div>
                </div>
                <div class="content-card" style="margin-top:1rem;">
                    <div class="content-card-title">P&L at Expiration</div>
                    <div class="chart-wrapper"><img id="pnl-chart-img" class="analysis-chart" style="display:none;"></div>
                </div>
                <div class="content-card" style="margin-top:1rem;">
                    <div class="content-card-title">Theta Decay Path</div>
                    <div class="chart-wrapper"><img id="theta-decay-chart-img" class="analysis-chart" style="display:none;"></div>
                </div>
                <div id="breakeven-card" class="content-card" style="margin-top:1rem;display:none;">
                    <div class="content-card-title">Breakeven Points</div>
                    <div id="breakeven-values"></div>
                </div>
                <div id="var-card" class="content-card" style="margin-top:1rem;display:none;">
                    <div class="content-card-title">Risk Metrics</div>
                    <div id="var-values"></div>
                </div>
            </div>
        </div>
    </form>
</div>
