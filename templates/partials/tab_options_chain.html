<div class="tab-content" id="tab-options-chain">
    <div class="panel-header">
        <h2><i class="fas fa-link"></i> Volatility Analysis</h2>
        {% if ticker %}
        <p class="panel-desc">Real-time IV surface, skew, OI profile, and expected move for <strong>{{ ticker }}</strong>.</p>
        {% endif %}
    </div>

    {% if streaming_mode and job_id and ticker %}
    <div id="tab-options-chain-content"
         class="loading-skeleton"
         hx-get="/render/options_chain?job={{ job_id }}&ticker={{ ticker }}"
         hx-trigger="load"
         hx-swap="outerHTML">
        <div class="empty-state"><i class="fas fa-spinner fa-spin empty-icon"></i><p>Loading volatility analysis…</p></div>
    </div>
    {% else %}
    {% include 'partials/fragments/options_chain.html' %}
    {% endif %}
</div>
