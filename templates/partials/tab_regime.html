<div class="tab-content" id="tab-regime" role="region" aria-labelledby="regime-heading">
    <div class="panel-header">
        <h2 id="regime-heading"><i class="fas fa-chart-line" aria-hidden="true"></i> Market Regime</h2>
        <p class="panel-desc">
            Composite regime label derived from <strong>^VIX</strong> (volatility)
            &amp; <strong>SPY</strong> vs its 20-day SMA (direction).
            Pure labeling — no signals, no predictions.
        </p>
    </div>

    <!-- Hero card — Design Principle P1: Composite regime label is
         the primary metric for this panel. aria-live so SR users hear
         transitions when regime data refreshes. -->
    <div id="regime-current-card" class="content-card">
        <div class="content-card-title">Current Regime</div>
        <div id="regime-current-body" aria-live="polite" aria-atomic="true">
            <div class="regime-hero regime-hero--placeholder"><span>Loading…</span></div>
        </div>
    </div>

    <div class="content-card" style="margin-top:1rem;">
        <div class="mr-toolbar" role="toolbar" aria-label="Regime history controls">
            <div class="btn-group" id="regime-range-btns" role="group" aria-label="History range">
                <button class="btn-toggle" data-days="30" aria-label="30 days">30D</button>
                <button class="btn-toggle active" data-days="180" aria-label="180 days">180D</button>
                <button class="btn-toggle" data-days="365" aria-label="One year">1Y</button>
                <button class="btn-toggle" data-days="1095" aria-label="Three years">3Y</button>
            </div>
            <button class="btn-ghost btn-sm" id="regime-refresh-btn" aria-label="Refresh regime data">
                <i class="fas fa-sync" aria-hidden="true"></i> Refresh
            </button>
            <button class="btn-ghost btn-sm" id="regime-backfill-btn" aria-label="Backfill and persist regime history">
                <i class="fas fa-database" aria-hidden="true"></i> Backfill &amp; Persist
            </button>
            <span id="regime-source-tag" class="meta-chip" style="margin-left:auto;" aria-live="polite"></span>
        </div>
        <div id="regime-strip-container" style="margin-top:.75rem;height:320px;position:relative;"
             role="img" aria-label="Regime history strip chart">
            <canvas id="regime-strip-chart"></canvas>
        </div>
    </div>

    <div class="content-card" style="margin-top:1rem;">
        <div class="content-card-title">Coverage Summary</div>
        <div id="regime-coverage-body" style="padding:.5rem 0;" aria-live="polite">
            <span class="muted">—</span>
        </div>
    </div>

    <div class="content-card" style="margin-top:1rem;">
        <div class="content-card-title">Recent Transitions</div>
        <div id="regime-transitions-body" class="table-wrapper" aria-live="polite">
            <span class="muted">—</span>
        </div>
    </div>
</div>
