# Failure Registry — Central source of truth for failure patterns
# Both hooks and skills read/update this file to coordinate detection,
# escalation, and resolution of recurring issues.
#
# Fields:
#   hook_regex:       regex used by analyze_test_output.py to classify failures
#   skill_pattern:    human-readable label used in skill references
#   effective_level:  current recommended escalation level (1-4)
#   times_seen:       total occurrences detected by hooks
#   last_seen:        ISO timestamp of last occurrence
#   last_escalated:   ISO timestamp of last escalation suggestion (cooldown reference)
#   resolved:         whether this pattern is considered resolved
#   resolution_note:  brief description of how it was resolved
#   related_files:    files commonly involved in this failure

patterns:

  nan-propagation:
    hook_regex: "NaN|nan|isna|notna|fillna|dropna"
    skill_pattern: "Pattern A — NaN filler rows from failed download"
    effective_level: 2
    times_seen: 0
    last_seen: null
    last_escalated: null
    resolved: false
    resolution_note: null
    related_files:
      - data_pipeline/cleaning.py
      - data_pipeline/downloader.py
      - core/price_dynamic.py

  empty-dataframe:
